<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>18 BANI HASHIM - Offline</title>

    <meta name="description" content="You are offline. Please check your internet connection.">

    <link rel="stylesheet" href="css/style.css">

    <style>

        body{

            margin:0;

            height:100vh;

            display:flex;

            align-items:center;

            justify-content:center;

            background:#0b0b10;

            color:#fff;

            font-family:system-ui;

        }

        .offline-card{

            text-align:center;

            padding:40px;

            border-radius:24px;

            background:rgba(255,255,255,0.05);

            border:1px solid rgba(255,255,255,0.08);

            backdrop-filter:blur(20px);

        }

        .offline-title{

            font-size:2rem;

            margin-bottom:10px;

        }

        .offline-text{

            color:rgba(255,255,255,0.7);

            margin-bottom:20px;

        }

        .retry-btn{

            padding:12px 24px;

            border-radius:12px;

            border:none;

            background:#ef4444;

            color:#fff;

            cursor:pointer;

            transition:.3s;

        }

        .retry-btn:hover{

            transform:translateY(-2px);

        }

    </style>

</head>

<body>

    <div class="offline-card">

        <div class="offline-title">

            You are Offline

        </div>

        <div class="offline-text">

            Please check your internet connection and try again.

        </div>

        <button class="retry-btn" onclick="location.reload()">

            Retry

        </button>

    </div>

</body>

</html>
